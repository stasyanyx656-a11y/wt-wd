<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#phoneGrad)"/>
  <!-- Phone body -->
  <rect x="35" y="20" width="30" height="60" rx="5" fill="#0f172a" stroke="#ffffff" stroke-width="2"/>
  <!-- Screen -->
  <rect x="38" y="24" width="24" height="52" rx="2" fill="#1e293b"/>
  <!-- Camera notch -->
  <rect x="46" y="21" width="8" height="2" rx="1" fill="#000000"/>
  <!-- Home indicator line -->
  <line x1="45" y1="74" x2="55" y2="74" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>
</svg>
